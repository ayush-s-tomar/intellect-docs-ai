name: Keep Supabase Alive

# Pings the app's /api/health endpoint every 3 days so the
# Supabase free-tier project never sits idle long enough to
# auto-pause. Also runnable manually from the Actions tab.
on:
  schedule:
    - cron: '0 9 */3 * *'   # every 3 days at 09:00 UTC
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          response=$(curl -s -o response.txt -w "%{http_code}" "${{ secrets.APP_HEALTH_URL }}")
          echo "HTTP status: $response"
          echo "Response body:"
          cat response.txt

          if [ "$response" -ne 200 ]; then
            echo "❌ Health check failed with status $response"
            exit 1
          fi

          echo "✅ Supabase project pinged successfully"